<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depósito Versátil — Usuarios</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <nav class="navbar">
    <h2>📦 Depósito Versátil</h2>
    <div class="navbar-right">
      <a href="/dashboard" class="btn btn-secondary btn-sm">← Inventario</a>
      <a href="/logout" class="btn btn-secondary btn-sm">Salir</a>
    </div>
  </nav>

  <div class="container">
    <div class="toolbar">
      <h2 style="font-size:1.4rem">👥 Gestión de usuarios</h2>
      <button class="btn btn-primary" onclick="abrirModalNuevo()">+ Nuevo usuario</button>
    </div>

    <div id="alerta" class="alert" style="display:none; margin-bottom:1rem"></div>

    <div style="background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); overflow:hidden">
      <table style="width:100%; border-collapse:collapse">
        <thead>
          <tr style="background:#f8f9fa; border-bottom:2px solid #eee">
            <th style="padding:1rem; text-align:left; font-size:0.9rem; color:#666">Nombre</th>
            <th style="padding:1rem; text-align:left; font-size:0.9rem; color:#666">Email</th>
            <th style="padding:1rem; text-align:left; font-size:0.9rem; color:#666">Rol</th>
            <th style="padding:1rem; text-align:left; font-size:0.9rem; color:#666">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-usuarios"></tbody>
      </table>
    </div>
  </div>

  <!-- MODAL NUEVO USUARIO -->
  <div class="modal-overlay" id="modal-usuario" style="display:none">
    <div class="modal">
      <h2 id="modal-titulo">Nuevo Usuario</h2>
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" id="nombre" placeholder="Nombre completo" />
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="email@ejemplo.com" />
      </div>
      <div class="form-group">
        <label>Contraseña *</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select id="rol">
          <option value="empleado">Empleado</option>
          <option value="dueño">Dueño</option>
        </select>
      </div>
      <div id="modal-error" class="alert alert-error" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarUsuario()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- MODAL CAMBIAR CONTRASEÑA -->
  <div class="modal-overlay" id="modal-password" style="display:none">
    <div class="modal">
      <h2>Cambiar contraseña</h2>
      <input type="hidden" id="pwd-usuario-id" />
      <div class="form-group">
        <label>Nueva contraseña *</label>
        <input type="password" id="nueva-password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="document.getElementById('modal-password').style.display='none'">Cancelar</button>
        <button class="btn btn-primary" onclick="cambiarPassword()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    async function cargarUsuarios() {
      const res = await fetch('/api/usuarios');
      const usuarios = await res.json();
      const tbody = document.getElementById('tabla-usuarios');

      if (usuarios.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="padding:2rem; text-align:center; color:#888">No hay usuarios registrados.</td></tr>';
        return;
      }

      tbody.innerHTML = usuarios.map(u => `
        <tr style="border-bottom:1px solid #f0f0f0">
          <td style="padding:1rem; font-weight:500">${u.nombre}</td>
          <td style="padding:1rem; color:#666">${u.email}</td>
          <td style="padding:1rem">
            <span style="
              background:${u.rol === 'dueño' ? '#eaf0fb' : '#eafaf1'};
              color:${u.rol === 'dueño' ? '#2563eb' : '#27ae60'};
              padding:0.2rem 0.7rem;
              border-radius:20px;
              font-size:0.8rem;
              font-weight:600
            ">${u.rol}</span>
          </td>
          <td style="padding:1rem">
            <div style="display:flex; gap:0.5rem">
              <button class="btn btn-warning btn-sm" onclick="abrirModalPassword(${u.id})">🔑 Contraseña</button>
              <button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${u.id}, '${u.nombre}')">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function abrirModalNuevo() {
      document.getElementById('nombre').value = '';
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
      document.getElementById('rol').value = 'empleado';
      document.getElementById('modal-error').style.display = 'none';
      document.getElementById('modal-usuario').style.display = 'flex';
    }

    function cerrarModal() {
      document.getElementById('modal-usuario').style.display = 'none';
    }

    async function guardarUsuario() {
      const nombre = document.getElementById('nombre').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rol = document.getElementById('rol').value;

      if (!nombre || !email || !password) {
        mostrarError('modal-error', 'Completá todos los campos obligatorios.');
        return;
      }
      if (password.length < 6) {
        mostrarError('modal-error', 'La contraseña debe tener al menos 6 caracteres.');
        return;
      }

      const res = await fetch('/api/usuarios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, password, rol })
      });

      const data = await res.json();
      if (!res.ok) {
        mostrarError('modal-error', data.error);
        return;
      }

      cerrarModal();
      cargarUsuarios();
    }

    async function eliminarUsuario(id, nombre) {
      if (!confirm(`¿Eliminar al usuario "${nombre}"?`)) return;
      const res = await fetch('/api/usuarios/' + id, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) {
        alert(data.error);
        return;
      }
      cargarUsuarios();
    }

    function abrirModalPassword(id) {
      document.getElementById('pwd-usuario-id').value = id;
      document.getElementById('nueva-password').value = '';
      document.getElementById('modal-password').style.display = 'flex';
    }

    async function cambiarPassword() {
      const id = document.getElementById('pwd-usuario-id').value;
      const password = document.getElementById('nueva-password').value;

      if (password.length < 6) {
        alert('La contraseña debe tener al menos 6 caracteres.');
        return;
      }

      await fetch(`/api/usuarios/${id}/password`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      document.getElementById('modal-password').style.display = 'none';
      alert('Contraseña actualizada correctamente.');
    }

    function mostrarError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }

    // Cerrar modales clickeando afuera
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.style.display = 'none';
      });
    });

    cargarUsuarios();
  </script>

</body>
</html>
